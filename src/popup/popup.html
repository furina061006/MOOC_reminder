<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOOC Reminder</title>
  <link rel="stylesheet" href="popup.css">
  <style>
    /* 加载状态：init 完成后隐藏 */
    #loading-placeholder {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 60px 20px; text-align: center; color: var(--text-faint, #999);
    }
    #loading-placeholder .spinner {
      width: 28px; height: 28px; border: 3px solid var(--border, #e0e0e0);
      border-top-color: var(--accent, #007BFF); border-radius: 50%;
      animation: popup-spin 0.8s linear infinite; margin-bottom: 12px;
    }
    @keyframes popup-spin { to { transform: rotate(360deg); } }
    body.loaded #loading-placeholder { display: none; }
  </style>
</head>
<body>
  <!-- 加载占位 -->
  <div id="loading-placeholder">
    <div class="spinner"></div>
    <p style="font-size:13px;font-weight:500;">加载中...</p>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <span class="logo"><img src="../assets/icons/icon16.png" alt="" width="20" height="20"></span>
      <h1 class="title">MOOC Reminder</h1>
    </div>
    <div class="header-right">
      <button id="settings-btn" class="icon-btn" title="设置" aria-label="设置">
        <span class="icon-slot" data-icon="settings" data-icon-size="16"></span>
      </button>
      <button id="refresh-btn" class="icon-btn" title="立即刷新" aria-label="立即刷新">
        <span class="icon-slot" data-icon="refresh" data-icon-size="16"></span>
      </button>
    </div>
  </header>

  <!-- Summary Bar -->
  <div id="summary-bar" class="summary-bar">
    <div class="summary-item overdue">
      <span class="summary-dot"></span>
      <span class="summary-count" id="count-overdue">0</span>
      <span class="summary-label">已过期</span>
    </div>
    <div class="summary-item soon">
      <span class="summary-dot"></span>
      <span class="summary-count" id="count-soon">0</span>
      <span class="summary-label">即将截止</span>
    </div>
    <div class="summary-item normal">
      <span class="summary-dot"></span>
      <span class="summary-count" id="count-normal">0</span>
      <span class="summary-label">待完成</span>
    </div>
  </div>

  <!-- Filter & Sort -->
  <div class="controls">
    <select id="filter-select" class="select" aria-label="筛选">
      <option value="unfinished">未完成</option>
      <option value="overdue">已过期</option>
      <option value="completed">已完成</option>
      <option value="all">全部（含过期）</option>
    </select>
  </div>

  <!-- Homework List -->
  <main id="homework-list" class="homework-list">
    <!-- Dynamically populated -->
  </main>

  <!-- Empty State -->
  <div id="empty-state" class="empty-state" style="display: none;">
    <div class="empty-icon" data-icon="sparkles" data-icon-size="44"></div>
    <p class="empty-title">没有未完成的作业</p>
    <p class="empty-desc">打开任意 icourse163.org 页面后点击刷新；或在 MOOC 页面中自动刷新</p>
    <button id="empty-refresh-btn" class="btn btn-primary">
      <span class="icon-slot" data-icon="refresh" data-icon-size="14"></span>立即刷新
    </button>
  </div>

  <!-- Login / Scrape Warning (content set by popup.js) -->
  <div id="login-warning" class="login-warning" style="display: none;">
    <div class="warning-icon" data-icon="lock" data-icon-size="32"></div>
    <p>请先登录 icourse163.org</p>
  </div>

  <div id="diagnostics" class="diagnostics" style="display: none;"></div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-info">
      <span id="total-count">共 0 项未完成</span>
      <span class="footer-sep">·</span>
      <span id="sync-time">尚未同步</span>
      <br>
      <span style="font-size:10px;">反馈建议：zemei.huang@foxmail.com</span>
    </div>
    <div class="footer-actions">
      <button id="export-ics-btn" class="btn btn-sm btn-ghost">
        <span class="icon-slot" data-icon="calendar" data-icon-size="13"></span>导出日历
      </button>
      <button id="reset-data-btn" class="btn btn-sm btn-ghost btn-danger">
        <span class="icon-slot" data-icon="trash" data-icon-size="13"></span>重置数据
      </button>
    </div>
  </footer>

  <script src="icons.js"></script>
  <script src="calendar-export.js"></script>
  <script src="popup.js"></script>
</body>
</html>
