<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOOC Reminder</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <span class="logo"><img src="../assets/icons/icon16.png" style="width:20px;height:20px;vertical-align:middle;"></span>
      <h1 class="title">MOOC Reminder</h1>
    </div>
    <div class="header-right">
      <button id="refresh-btn" class="icon-btn" title="立即刷新">🔄</button>
    </div>
  </header>

  <!-- Summary Bar -->
  <div id="summary-bar" class="summary-bar">
    <div class="summary-item overdue">
      <span class="summary-dot"></span>
      <span class="summary-label">已过期</span>
      <span id="count-overdue" class="summary-count">0</span>
    </div>
    <div class="summary-item soon">
      <span class="summary-dot"></span>
      <span class="summary-label">即将截止</span>
      <span id="count-soon" class="summary-count">0</span>
    </div>
    <div class="summary-item normal">
      <span class="summary-dot"></span>
      <span class="summary-label">待完成</span>
      <span id="count-normal" class="summary-count">0</span>
    </div>
  </div>

  <!-- Filter & Sort -->
  <div class="controls">
    <select id="filter-select" class="select">
      <option value="unfinished">未完成</option>
      <option value="completed">已完成</option>
      <option value="all">全部（含未完成和已完成）</option>
    </select>
  </div>

  <!-- Homework List -->
  <main id="homework-list" class="homework-list">
    <!-- Dynamically populated -->
  </main>

  <!-- Empty State -->
  <div id="empty-state" class="empty-state" style="display: none;">
    <div class="empty-icon">🎉</div>
    <p class="empty-title">没有未完成的作业</p>
    <p class="empty-desc">打开 icourse163.org 课程的 测验与作业 页面后点击刷新</p>
    <button id="empty-refresh-btn" class="btn btn-primary">立即刷新</button>
  </div>

  <!-- Login Wall Warning -->
  <div id="login-warning" class="login-warning" style="display: none;">
    <div class="warning-icon">🔒</div>
    <p>请先登录 icourse163.org</p>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-info">
      <span id="total-count">共 0 项未完成</span>
      <span class="footer-sep">|</span>
      <span id="sync-time">尚未同步</span>
    </div>
    <div class="footer-actions">
      <button id="reset-data-btn" class="btn btn-sm btn-ghost" style="color:#dc3545;">重置数据</button>
    </div>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
